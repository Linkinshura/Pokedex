<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex Prototipo</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="hero">

        <div class="hero-content">
            <h1>Pokédex Prototipo</h1>
            <p>Explora todas las regiones Pokémon</p>
        </div>

        <button id="themeBtn">
            🌙
        </button>

    </header>

    <section class="filters">

        <div class="filter-group">

            <input
                type="text"
                id="search"
                placeholder="Buscar Pokémon..."
            >

            <select id="regionFilter">

                <option value="1">Kanto</option>
                <option value="2">Johto</option>
                <option value="3">Hoenn</option>
                <option value="4">Sinnoh</option>
                <option value="5">Teselia</option>
                <option value="6">Kalos</option>
                <option value="7">Alola</option>
                <option value="8">Galar</option>
                <option value="9">Paldea</option>

            </select>

            <select id="typeFilter">
                <option value="">
                    Todos los tipos
                </option>
            </select>

        </div>

    </section>

    <main>

        <section class="pokemon-section">

            <div class="section-title">

                <h2>
                    Pokémon de la región
                </h2>

                <span id="pokemonCount">
                    0 Pokémon
                </span>

            </div>

            <div
                id="pokemonGrid"
                class="grid"
            ></div>

        </section>

        <section class="favorites-section">

            <div class="section-title">

                <h2>
                    Favoritos
                </h2>

                <span id="favoritesCount">
                    0 Pokémon
                </span>

            </div>

            <div
                id="favoritesGrid"
                class="grid"
            ></div>

        </section>

    </main>

    <div
        id="modal"
        class="modal"
    >

        <div class="modal-content">

            <span id="closeModal">
                ×
            </span>

            <div id="pokemonDetails"></div>

        </div>

    </div>

    <div id="toast"></div>

    <script src="script.js"></script>

</body>
</html>
